# Georgia CPA Accounting System — nginx reverse proxy
# Serves frontend static files and proxies /api/* to the FastAPI backend.
# Uses a self-signed TLS certificate for LAN encryption.

worker_processes 1;

events {
    worker_connections 64;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Logging
    access_log /Users/edwardahrens/tax/deploy/logs/nginx.access.log;
    error_log  /Users/edwardahrens/tax/deploy/logs/nginx.error.log;

    # Gzip for frontend assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name _;

        # Self-signed certificate (generated by deploy/setup.sh)
        ssl_certificate     /Users/edwardahrens/tax/deploy/certs/gacpa.crt;
        ssl_certificate_key /Users/edwardahrens/tax/deploy/certs/gacpa.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000" always;

        # API requests → backend
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running operations (reports, tax exports)
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }

        # Frontend static files (Vite build output)
        location / {
            root /Users/edwardahrens/tax/frontend/dist;
            index index.html;

            # SPA fallback — let React Router handle client-side routes
            try_files $uri $uri/ /index.html;
        }

        # Block dotfiles
        location ~ /\. {
            deny all;
        }
    }
}
